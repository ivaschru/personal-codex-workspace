name: Validate template

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate public template
        run: |
          python3 scripts/check_workspace.py --mode template
          python3 scripts/build_template_manifest.py --check
          python3 scripts/integration_preflight.py --list

      - name: Run tests
        run: python3 -m unittest discover -s tests -v
